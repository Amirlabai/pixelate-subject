name: Semantic Release

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  release:
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute semver from commits
        uses: paulhatch/semantic-version@v5.4.0
        id: semver
        with:
          tag_prefix: v
          version_format: "${major}.${minor}.${patch}"
          bump_each_commit: false
          search_commit_body: true
          # major: → major bump; feat! / BREAKING CHANGE → major bump
          major_pattern: "(?:^major[:(]|BREAKING CHANGE|!)"
          # feat: → minor bump
          minor_pattern: "^feat[:(]"
          # fix: and other commits → patch bump when changes exist since last tag

      - name: Sync VERSION file
        if: steps.semver.outputs.version_changed == 'true'
        run: echo "${{ steps.semver.outputs.version }}" > VERSION

      - name: Commit version bump
        if: steps.semver.outputs.version_changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add VERSION
          git commit -m "chore(release): v${{ steps.semver.outputs.version }} [skip ci]"
          git push

      - name: Create GitHub Release
        if: steps.semver.outputs.version_changed == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.semver.outputs.version }}
          name: v${{ steps.semver.outputs.version }}
          generate_release_notes: true
